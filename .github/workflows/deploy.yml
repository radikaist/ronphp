name: Deploy RON PHP to Hosting

on:
  push:
    branches:
      - main # (Catatan: Ubah menjadi 'master' jika branch utamamu di GitHub bernama master)

jobs:
  web-deploy:
    name: 🎉 Deploy to FTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Mengambil kode terbaru
      uses: actions/checkout@v4
    
    - name: 📂 Mengirim file ke Server Hosting
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: public_html/ronphp.radika.id/
        # Mengecualikan folder git agar tidak membebani server
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*/**
